<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles de Habilidad - Mi Portafolio</title>
    <!-- RUTA CORREGIDA: Sin /src/ -->
    <link rel="stylesheet" href="./css/components.css">
    <style>
        /* Estilos optimizados */
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .details-container {
            max-width: 650px;
            width: 90%;
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.7) 0%, rgba(15, 23, 42, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .badge-icon {
            width: 70px;
            height: 70px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            margin: 0 auto 20px auto;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .badge-java {
            background: linear-gradient(135deg, #ea580c, #f97316);
        }

        .badge-sql {
            background: linear-gradient(135deg, #00758f, #00f2fe);
        }

        .badge-front {
            background: linear-gradient(135deg, #a855f7, #ec4899);
        }

        .skill-title {
            font-size: 2.4rem;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .skill-full-desc {
            color: #94a3b8;
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 30px;
            text-align: justify;
        }

        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 35px;
        }

        .tech-pill {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        .btn-back {
            display: inline-block;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: #ffffff;
            color: #0f172a;
        }
    </style>
</head>

<body>

    <div class="details-container">
        <div id="skill-badge" class="badge-icon">☕</div>
        <h1 id="skill-title" class="skill-title">Cargando Habilidad...</h1>
        <p id="skill-desc" class="skill-full-desc">Obteniendo la información detallada desde el repositorio local...</p>

        <div id="tech-stack" class="tech-stack"></div>

        <a href="./index.html#habilidades" class="btn-back">← Volver al Inicio</a>
    </div>

    <!-- RUTA CORREGIDA: Sin /src/ -->
    <script src="./js/details.js"></script>
</body>

</html>
